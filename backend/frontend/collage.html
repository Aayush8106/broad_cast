<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Chat</title>
    <link rel="icon" type="image/x-icon" href="./favicons/college.png">
    <link rel="stylesheet" href="./css/public.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <h2>Participants</h2>
            <button id="closeSidebar">✖</button>
        </div>

        <div class="users" id="usersList">
            <!-- USERS WILL LOAD HERE -->
        </div>

    </div>

    <!-- CHAT -->
    <div class="chat">

        <div class="chat-header">

            <button id="menuBtn">☰</button>

            <h3>College Chat</h3>

            <button id="exitBtn">Exit</button>

        </div>

        <div class="messages" id="messages"></div>

        <div class="input-box">

            <textarea maxlength="255" id="input" placeholder="Type message..."></textarea>

            <button id="sendBtn">Send</button>

        </div>

    </div>

</div>

<!-- IMPORTANT: REQUIRED FOR ONLINE SYSTEM -->
<script src="./js/collage.js"></script>

</body>
</html>
