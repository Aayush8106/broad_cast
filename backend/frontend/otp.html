<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP</title>
    <link rel="icon" type="image/x-icon" href="./favicons/verified.png">
    <link rel="stylesheet" href="css/otp.css">
</head>
<body>
    
     <form class="otp-Form" id="form" action="/verify-otp" method="post">
 
  <span class="mainHeading">Enter OTP</span>
  <p class="otpSubheading" id="invalid">We have sent a verification code to your Gmail</p>
  <div class="inputContainer">
   <input required type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp-input1">
   <input required type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp-input2">
   <input required type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp-input3">
   <input required type="text" inputmode="numeric" maxlength="1" class="otp-input" id="otp-input4">
   
   <!--hidden otp to combine all 4 above input in single input-->
   <input type="hidden" name="otp" id="otp">

  </div>
   <button class="verifyButton" id="verifyBtn" type="submit" >Verify</button>
    
     <button class="exitBtn" type="button" id="exitBtn" >×</button>
     <p class="resendNote">Didn't receive the code? <button id="resendBtn" class="resendBtn">Resend Code</button></p>
     
     
</form>

<script src="./js/otp.js"></script>
</body>
</html>
