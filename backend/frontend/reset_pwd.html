<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <link rel="icon" type="image/x-icon" href="./favicons/update_pwd.png">
    <link rel="stylesheet" href="./css/reset_pwd.css">
</head>
<body>
     
    <form class="form">
       <p class="form-title">Change Password</p>
      <span class="user">Username:</span> <span id="username">name</span>
        <div class="input-container">
          <input id="pwd" class="input" placeholder="Enter password" type="password">

          <span id="togglePwd">
            <svg stroke="currentColor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
            </svg>
          </span>
        </div>
      <div class="input-container">
          <input id="con_pwd" class="input" placeholder="Confirm password" type="password">

          <span id="toggleConPwd">
            <svg stroke="currentColor" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"></path>
            </svg> 
          </span>
        </div>
        <p class="input_err ">Confirm Password doesnt match!</p>
         <button class="submit" type="submit">
        Update
      </button>

     
   </form>
 
   <script src="./js/reset_pwd.js"></script>
</body>
</html>
