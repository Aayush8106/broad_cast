<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin panel</title>
    <link rel="icon" type="image/x-icon" href="/favicons/admin.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./css/admin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<body>
   
    <div class="relative h-full overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default w-full">
    <table class="w-full text-sm text-left ">

  <!-- HEADER (4 columns only) -->
  <thead class="text-sm text-gray-200 bg-gray-800 border-b border-gray-700">
    <tr>
      <th class="px-6 py-3">id</th>
      <th class="px-6 py-3">Name</th>
      <th class="px-6 py-3">mail</th>
      <th class="px-6 py-3">BAN</th>
      <th class="px-6 py-3">DELETE</th>
    </tr>
  </thead>

  <!-- BODY (5 columns only) -->
  <tbody id="tableBody">
    
  </tbody>

</table>
</div>

    <script src="./js/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
