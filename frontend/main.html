<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BroDCasT</title>
    <link rel="icon" type="image/x-icon" href="./favicons/broadcast.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
      
     <div id="user_info"
  class="collapsed max-w-xs w-full bg-white border border-gray-200 rounded-xl overflow-hidden shadow-[0_10px_25px_-5px_rgba(0,0,0,0.05),0_8px_10px_-6px_rgba(0,0,0,0.04)] hover:shadow-[0_20px_25px_-5px_rgba(0,0,0,0.08),0_15px_15px_-6px_rgba(0,0,0,0.06)] transition-all duration-300"
>
  <div
    class="px-4 py-4 border-b border-gray-200 bg-gradient-to-r from-blue-700 to-blue-600"
  >
    <p class="text-xs font-medium text-blue-200 uppercase tracking-wider">
      Signed in as
    </p>
    <div class="flex items-center mt-1">
      <div
        class="bg-blue-100 text-blue-600 rounded-full w-8 h-8 flex items-center justify-center mr-2"
      >
        <svg
          fill="currentColor"
          viewBox="0 0 20 20"
          class="h-4 w-4"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            clip-rule="evenodd"
            d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
            fill-rule="evenodd"
          ></path>
        </svg>
      </div>
      <p id="userEmail"
   class="text-sm font-medium text-white truncate">
</p>
        
      </p>
    </div>
  </div>

  <div class="py-1.5">
    <a id="profileBtn"
      href="#"
      class="group relative flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-blue-50 transition-all duration-200"
    >
      <div
        class="absolute left-0 top-0 h-full w-1 bg-blue-500 rounded-r opacity-0 group-hover:opacity-100 transition-all duration-200 group-hover:scale-y-100 scale-y-80"
      ></div>
      <div
        class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center mr-3 group-hover:bg-blue-200 transition-colors duration-200"
      >
        <svg
          fill="currentColor"
          viewBox="0 0 20 20"
          class="h-5 w-5 text-blue-600 group-hover:text-[#2b6cb0]"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            clip-rule="evenodd"
            d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
            fill-rule="evenodd"
          ></path>
        </svg>
      </div>
      <span class="font-medium text-gray-700 group-hover:text-[#1a365d]"
        >Profile</span
      >
      <svg
        fill="currentColor"
        viewBox="0 0 20 20"
        class="h-3 w-3 text-gray-400 ml-auto group-hover:text-[#2b6cb0]"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          clip-rule="evenodd"
          d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
          fill-rule="evenodd"
        ></path>
      </svg>
    </a>
    <a
      id="logoutBtn"
      class="group relative flex items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-red-50 transition-all duration-200"
    >
      <div
        class="absolute left-0 top-0 h-full w-1 bg-red-500 rounded-r opacity-0 group-hover:opacity-100 transition-all duration-200 group-hover:scale-y-100 scale-y-80"
      ></div>
      <div
        class="w-8 h-8 rounded-lg bg-red-100 flex items-center justify-center mr-3 group-hover:bg-red-200 transition-colors duration-200"
      >
        <svg
          fill="currentColor"
          viewBox="0 0 20 20"
          class="h-5 w-5 text-red-500 group-hover:text-red-600"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            clip-rule="evenodd"
            d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z"
            fill-rule="evenodd"
          ></path>
        </svg>
      </div>
      <span class="font-medium text-gray-700 group-hover:text-red-600"
        >Logout</span
      >
      <svg
        fill="currentColor"
        viewBox="0 0 20 20"
        class="h-3 w-3 text-gray-400 ml-auto group-hover:text-red-500"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          clip-rule="evenodd"
          d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
          fill-rule="evenodd"
        ></path>
      </svg>
    </a>
            <label id="burger" class="icon-menu" >
                <div class="bar bar--1"></div>
                <div class="bar bar--2"></div>
                <div class="bar bar--3"></div>
            </label>
  </div>
</div>
<img src="./favicons/anonymity.png" id="user_img" alt="">

    <main id="content">

<div id="submit_form"
  class="w-[300px] px-4 py-5 bg-white flex flex-col gap-3 rounded-md shadow-[0px_0px_15px_rgba(0,0,0,0.09)]"
>

  <legend class="text-xl font-semibold mb-3 select-none">Choose One</legend>
  <label
  for="html"
  class="font-medium h-14 relative hover:bg-zinc-100 flex items-center px-3 rounded-lg has-[:checked]:text-blue-500 has-[:checked]:bg-blue-50 has-[:checked]:ring-blue-300 has-[:checked]:ring-1 select-none option"
>

  <span class="label-text">Collage</span>

  <input
    type="radio"
    name="status"
    class="w-4 h-4 ml-auto accent-current"
    id="html"
  
  />

</label>
  <label
  for="css"
  class="font-medium h-14 relative hover:bg-zinc-100 flex items-center px-3 rounded-lg has-[:checked]:text-blue-500 has-[:checked]:bg-blue-50 has-[:checked]:ring-blue-300 has-[:checked]:ring-1 select-none option"
>

  <span class="label-text">Public</span>

  <input
    type="radio"
    name="status"
    class="w-4 h-4 ml-auto accent-current"
    id="css"
    
  />

</label>
  <button class="ui-btn" id="getInBtn">
  <span> Get in! </span>
</button>

  <h6>Total Users: <span>wait...</span></h6>

</div>


</main>
<div id="profileModal" class="profile-modal">

    <div class="profile-modal-content">

      
    <button id="closeProfileModal" type="button" class="noselect"><span class="text">Delete</span><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M24 20.188l-8.315-8.209 8.2-8.282-3.697-3.697-8.212 8.318-8.31-8.203-3.666 3.666 8.321 8.24-8.206 8.313 3.666 3.666 8.237-8.318 8.285 8.203z"></path></svg></span></button>

    <div class="old_name">
        Name: <span id="userName">loading...</span>
    </div>

    <div id="box_out">

        <p class="update">Update Username</p>

        <div id="new_name">
            <input
                type="text"
                class="input"
                placeholder="Username"
            >
        </div>

        <p class="input_err">Name already exist.</p>

        <button id="btn" class="button">
            <div class="button-outer">
                <div class="button-inner">
                    <span>Update</span>
                </div>
            </div>
        </button>

    </div>

</div>

</div>

<div id="logoutModal" class="logout-modal">

    <div class="logout-modal-content">
   
      <div class="card">
  <div class="card-content">
    <p class="card-heading">Log out</p>
    <p class="card-description">do you want to logout?</p>
  </div>
  <div class="card-button-wrapper">
    <button class="card-button secondary">Cancel</button>
    <button class="card-button primary" id="logoutConfirmBtn">Log out</button>
  </div>
</div>


     </div>

</div>

<!-- ================= COLLEGE MODAL ================= -->
<div id="collegeModal"
     class="hidden fixed inset-0 z-50 flex items-center justify-center">

    <!-- dark background -->
    <div class="absolute inset-0 bg-black/70"></div>

    <!-- modal box -->
    <div class="relative w-full max-w-md mx-auto font-mono">

        <div class="relative p-6 bg-black border-2 border-green-400 rounded-lg shadow-lg overflow-hidden">

            <!-- corners -->
            <div class="absolute top-0 left-0 w-6 h-1 bg-green-400"></div>
            <div class="absolute top-0 left-0 w-1 h-6 bg-green-400"></div>
            <div class="absolute top-0 right-0 w-6 h-1 bg-green-400"></div>
            <div class="absolute top-0 right-0 w-1 h-6 bg-green-400"></div>

            <div class="absolute bottom-0 left-0 w-6 h-1 bg-green-400"></div>
            <div class="absolute bottom-0 left-0 w-1 h-6 bg-green-400"></div>
            <div class="absolute bottom-0 right-0 w-6 h-1 bg-green-400"></div>
            <div class="absolute bottom-0 right-0 w-1 h-6 bg-green-400"></div>

            <div class="absolute inset-x-0 top-0 h-16 bg-gradient-to-b from-transparent via-green-900/20"></div>

            <!-- title -->
            <label class="mb-3 text-green-400 text-sm tracking-wider flex items-center">
                <span class="mr-2 text-green-600">➜</span>
                <span class="text-green-300 font-bold">COLLEGE ACCESS</span>
                <span class="ml-2 opacity-75 animate-pulse">▋</span>
            </label>

            <!-- password -->
            <input id="collegePassword"
                   type="text"
                   placeholder="ENTER PASSWORD"
                   class="w-full bg-transparent text-green-300 border-2 border-green-500 rounded-md p-3">

            <!-- error -->
            <p id="collegeError" class="hidden text-red-400 text-sm mt-2">
                Wrong password
            </p>

            <!-- buttons -->
            <div class="flex justify-end gap-3 mt-4">

                <button id="collegeCancelBtn"
                        class="px-4 py-2 bg-gray-700 text-white rounded">
                    Cancel
                </button>

                <button id="collegeJoinBtn"
                        class="px-4 py-2 bg-green-600 text-white rounded">
                    Join
                </button>

            </div>

        </div>

    </div>
</div>
    
    <script src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
